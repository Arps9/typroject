version: "3.9"

# ---------------------------------------------------------------------------
# Development docker-compose for the Compliance Audit platform.
# Brings up: Postgres, Redis, Django backend, Celery worker, Celery beat,
# and the Next.js frontend.  All services share a single internal network.
# ---------------------------------------------------------------------------

services:
  postgres:
    image: postgres:16-alpine
    container_name: ca_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-compliance_audit}
      POSTGRES_USER: ${POSTGRES_USER:-compliance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-compliance_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-compliance}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ca_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: ca_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: compliance_audit.settings.development
      DATABASE_URL: postgres://${POSTGRES_USER:-compliance}:${POSTGRES_PASSWORD:-compliance_dev_password}@postgres:5432/${POSTGRES_DB:-compliance_audit}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - backend_media:/app/media
      - backend_static:/app/staticfiles
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py makemigrations --noinput &&
             python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"

  celery_worker:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: ca_celery_worker
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: compliance_audit.settings.development
      DATABASE_URL: postgres://${POSTGRES_USER:-compliance}:${POSTGRES_PASSWORD:-compliance_dev_password}@postgres:5432/${POSTGRES_DB:-compliance_audit}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - backend_media:/app/media
    depends_on:
      - backend
      - redis
    command: celery -A compliance_audit worker -l info

  celery_beat:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: ca_celery_beat
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: compliance_audit.settings.development
      DATABASE_URL: postgres://${POSTGRES_USER:-compliance}:${POSTGRES_PASSWORD:-compliance_dev_password}@postgres:5432/${POSTGRES_DB:-compliance_audit}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis
    command: celery -A compliance_audit beat -l info

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    container_name: ca_frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env.local
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_data:
  backend_media:
  backend_static:
